<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي النرد 🎲</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --primary: #6366f1;
            --secondary: #ec4899;
            --success: #10b981;
            --danger: #ef4444;
            --info: #3b82f6;
            --text: #f8fafc;
            --gold: #f59e0b;
            --glass: rgba(30, 41, 59, 0.8);
        }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; outline: none; }

        body {
            margin: 0; padding: 0; background: linear-gradient(135deg, var(--bg) 0%, #1e1b4b 100%);
            color: var(--text); min-height: 100vh; overflow-x: hidden;
        }

        /* ------------------ شاشة البداية ------------------ */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('math.png');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-end;
            padding-bottom: 80px;
            z-index: 1000; transition: opacity 0.5s ease;
        }

        .btn-start {
            background: linear-gradient(135deg, var(--gold), #d97706);
            color: white; border: none; padding: 20px 50px; font-size: 2rem; font-weight: 900;
            border-radius: 50px; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            transition: 0.3s; animation: pulse 2s infinite; text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            width: 80%; max-width: 350px;
        }
        .btn-start:hover { transform: scale(1.05); box-shadow: 0 15px 40px rgba(245, 158, 11, 0.6); }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        /* ----------------------------------------------------------- */

        /* حاوية اللعبة الأساسية */
        #game-container {
            display: none; flex-direction: column; align-items: center; justify-content: flex-start;
            padding-top: 20px; width: 100%; min-height: 100vh; padding-bottom: 50px;
        }

        h1.game-header { color: var(--gold); text-shadow: 0 4px 10px rgba(0,0,0,0.5); font-size: 2.5rem; margin-bottom: 5px; text-align: center; margin-top: 0;}

        .dashboard {
            display: flex; justify-content: space-between; width: 90%; max-width: 500px;
            background: var(--glass); padding: 15px 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .stat { text-align: center; width: 50%; }
        .stat:first-child { border-left: 1px solid rgba(255,255,255,0.1); }
        .stat-title { font-size: 1rem; color: #cbd5e1; margin-bottom: 5px; }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--gold); }
        .stat-value.corrects { color: var(--success); }
        .target-score { font-size: 1.2rem; color: #64748b; }

        .game-area {
            background: var(--glass); width: 90%; max-width: 500px; padding: 30px 20px;
            border-radius: 20px; border: 1px solid var(--primary); text-align: center;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2); position: relative;
        }

        .dice-container {
            font-size: 6rem; line-height: 1; margin: 20px 0; display: inline-block;
            transition: transform 0.1s; cursor: pointer; color: white;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .rolling { animation: shake 0.4s infinite; color: var(--primary); }
        
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-10deg); }
            20% { transform: translate(-3px, 0px) rotate(10deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(10deg); }
            50% { transform: translate(-1px, 2px) rotate(-10deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-10deg); }
            80% { transform: translate(-1px, -1px) rotate(10deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-10deg); }
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: bold;
            border-radius: 50px; cursor: pointer; width: 100%; box-shadow: 0 5px 15px rgba(236, 72, 153, 0.4);
            transition: 0.2s; margin-top: 10px;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(236, 72, 153, 0.6); }
        .btn:active { transform: translateY(0); }

        .question-box { display: none; margin-top: 10px; animation: fadeIn 0.5s; }
        .question-text { font-size: 1.3rem; margin-bottom: 25px; font-weight: bold; line-height: 1.5; color: white;}
        
        .points-badge { 
            display: inline-block; background: rgba(245, 158, 11, 0.2); color: var(--gold); 
            padding: 8px 20px; border-radius: 20px; font-size: 1.1rem; font-weight:bold; 
            margin-bottom: 15px; border: 1px solid var(--gold);
        }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option-btn {
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
            color: white; padding: 15px; font-size: 1.3rem; border-radius: 15px;
            cursor: pointer; transition: 0.2s; font-weight: bold; font-family: sans-serif; direction: ltr;
        }
        .option-btn:hover { background: rgba(255,255,255,0.2); border-color: white; }
        .option-btn.correct { background: var(--success) !important; border-color: #059669 !important; color: white; transform: scale(1.05);}
        .option-btn.wrong { background: var(--danger) !important; border-color: #b91c1c !important; color: white; }

        .feedback { display: none; font-size: 1.3rem; font-weight: bold; margin-top: 20px; padding: 15px; border-radius: 15px; animation: pop 0.3s; line-height:1.5;}
        .feedback.win { background: rgba(16, 185, 129, 0.2); color: var(--success); border: 1px solid var(--success); }
        .feedback.lose { background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); }
        .feedback.info { background: rgba(59, 130, 246, 0.2); color: var(--info); border: 1px solid var(--info); }
        .feedback.champion { background: rgba(245, 158, 11, 0.2); color: var(--gold); border: 2px solid var(--gold); box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);}

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    </style>
</head>
<body>

    <!-- ================= شاشة البداية ================= -->
    <div id="start-screen">
        <button class="btn-start" onclick="startGame()">ابدأ اللعبة 🚀</button>
    </div>

    <!-- ================= شاشة اللعب ================= -->
    <div id="game-container">
        <h1 class="game-header">تحدي النرد 🎲</h1>
        <p style="color:#94a3b8; text-align:center; margin-top:0; margin-bottom:20px; font-size:1.1rem;">أول واحد يوصل 20 نقطة يفوز! 🏆</p>

        <!-- لوحة النقاط -->
        <div class="dashboard">
            <div class="stat">
                <div class="stat-title">النقاط الحالية</div>
                <div class="stat-value" id="score-display">0 <span class="target-score">/ 20</span></div>
            </div>
            <div class="stat">
                <div class="stat-title">الإجابات الصحيحة</div>
                <div class="stat-value corrects" id="correct-count">0</div>
            </div>
        </div>

        <!-- مساحة اللعب -->
        <div class="game-area">
            
            <div id="dice-section">
                <h2 style="color: white; margin-top: 0; font-size:1.5rem;" id="main-msg">ارمي النرد وحدد مصيرك!</h2>
                <div class="dice-container" id="dice" onclick="rollDice()">⚀</div>
                <button class="btn" id="roll-btn" onclick="rollDice()">ارمي النرد 🎲</button>
            </div>

            <div id="question-section" class="question-box">
                <div class="points-badge" id="q-points">سؤال بـ 1 نقطة</div>
                <div class="question-text" id="q-text">هنا يكتب السؤال...</div>
                <div class="options-grid" id="options-area">
                    <!-- الأزرار تتولد برمجياً هنا -->
                </div>
            </div>

            <div id="feedback-section" class="feedback">
                <!-- رسالة الصح أو الغلط أو الفوز -->
            </div>
            <button class="btn" id="next-btn" style="display:none; margin-top: 20px; background: var(--success);" onclick="resetTurn()">استمرار 🚀</button>

        </div>
    </div>

    <script>
        // دالة إخفاء شاشة البداية وإظهار اللعبة
        function startGame() {
            const startScreen = document.getElementById('start-screen');
            const gameContainer = document.getElementById('game-container');
            
            startScreen.style.opacity = '0';
            
            setTimeout(() => {
                startScreen.style.display = 'none';
                gameContainer.style.display = 'flex';
            }, 500); 
        }

        // بنك الأسئلة المحدث بناءً على طلبك 
        const questionsBank = {
            1: [ 
                { q: "عند رمي قطعة نقد، كم عدد النواتج الممكنة؟", options: ["1", "2", "3", "4"], answer: "2" },
                { q: "عند رمي حجر نرد، كم عدد النواتج الممكنة؟", options: ["4", "5", "6", "8"], answer: "6" },
                { q: "ما هو فضاء العينة لرمي عملة معدنية؟", options: ["{1,2}", "{ص، ك}", "{0}", "{3,4}"], answer: "{ص، ك}" },
                { q: "ما هو احتمال وقوع الحدث المستحيل؟", options: ["1", "1/2", "0", "2"], answer: "0" }
            ],
            2: [ 
                { q: "ما هو احتمال ظهور عدد فردي عند رمي حجر النرد؟", options: ["2/6", "3/6", "4/6", "1/6"], answer: "3/6" },
                { q: "ما هو احتمال ظهور الرقم 6 عند رمي حجر النرد؟", options: ["1/6", "2/6", "3/6", "6/6"], answer: "1/6" },
                { q: "عند رمي عملتين، ما احتمال ظهور صورتين؟", options: ["1/4", "2/4", "3/4", "1"], answer: "1/4" },
                { q: "عند رمي حجر نرد، ما احتمال ظهور عدد أقل من 3؟", options: ["2/6", "3/6", "4/6", "1/6"], answer: "2/6" }
            ],
            3: [ 
                { q: "لديك 3 قمصان و2 بناطيل، كم عدد طرق اختيار طقم كامل؟", options: ["5", "6", "3", "2"], answer: "6" },
                { q: "اختيار رقمين من المجموعة {1,2,3} (مع الترتيب)، كم عدد الطرق؟", options: ["6", "9", "3", "4"], answer: "9" },
                { q: "قطعة طولها 10 سم، ما احتمال اختيار نقطة من أول 2 سم؟", options: ["1/5", "3/10", "1/2", "1/10"], answer: "1/5" },
                { q: "لديك 4 طرق للسفر و3 أوقات مختلفة، كم عدد خيارات السفر؟", options: ["7", "12", "4", "3"], answer: "12" }
            ],
            4: [ 
                { q: "حدثان مستقلان احتمالهما 0.5 و 0.2، ما احتمال وقوعهما معاً؟", options: ["0.1", "0.7", "0.3", "0.5"], answer: "0.1" },
                { q: "حدثان متنافيان احتمالهما 0.3 و 0.4، ما احتمال وقوع أحدهما أو الآخر؟", options: ["0.7", "0.12", "0.5", "0.4"], answer: "0.7" },
                { q: "عند رمي حجرين نرد، ما احتمال ظهور نفس الرقم على الحجرين؟", options: ["6/36", "5/36", "4/36", "2/36"], answer: "6/36" },
                { q: "عند رمي حجرين نرد، ما احتمال أن يكون مجموع العددين 10؟", options: ["3/36", "2/36", "1/36", "4/36"], answer: "3/36" }
            ],
            5: [ 
                { q: "صندوق فيه 3 كرات حمراء و2 زرقاء، سحب كرتين بدون إرجاع، ما احتمال أن تكونا حمراء؟", options: ["3/10", "2/5", "1/5", "4/5"], answer: "3/10" },
                { q: "ما احتمال نجاح حدثين مستقلين احتمالهما 0.8 و 0.5؟", options: ["0.4", "0.3", "0.8", "0.5"], answer: "0.4" },
                { q: "كم عدد طرق ترتيب كلمة تتكون من 6 أحرف مختلفة؟", options: ["120", "720", "360", "600"], answer: "720" },
                { q: "كم عدد طرق اختيار عنصرين من بين 5 عناصر؟", options: ["5", "10", "15", "20"], answer: "10" }
            ],
            6: [ 
                { q: "لديك الأحرف (أ، أ، ب، ب، ج)، كم عدد التبديلات الممكنة؟", options: ["30", "60", "120", "20"], answer: "30" },
                { q: "ما احتمال (A∪B) إذا كان الحدثان مستقلين باحتماليات 0.5 و 0.4؟", options: ["0.7", "0.8", "0.9", "0.6"], answer: "0.7" },
                { q: "عند رمي حجرين نرد، ما احتمال أن يكون المجموع = 8؟", options: ["5/36", "4/36", "6/36", "3/36"], answer: "5/36" },
                { q: "4 كرات حمراء و3 زرقاء، سحب كرتين بدون إرجاع، ما احتمال أن تكونا مختلفتين؟", options: ["1/2", "4/7", "2/7", "3/7"], answer: "4/7" }
            ]
        };

        const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        let score = 0;
        let correctCount = 0;
        let currentDiceNumber = 1;
        let currentQuestionObj = null;

        function checkGameEnd() {
            let totalQuestionsLeft = 0;
            for (let key in questionsBank) {
                totalQuestionsLeft += questionsBank[key].length;
            }
            return totalQuestionsLeft === 0;
        }

        function rollDice() {
            if (checkGameEnd()) {
                document.getElementById('main-msg').innerText = "خلصتوا كل الأسئلة! العب من جديد 🔄";
                document.getElementById('dice').style.display = 'none';
                document.getElementById('roll-btn').innerText = "العب من جديد 🔄";
                document.getElementById('roll-btn').onclick = () => location.reload();
                return;
            }

            const diceEl = document.getElementById('dice');
            const rollBtn = document.getElementById('roll-btn');
            
            rollBtn.style.display = 'none';
            diceEl.classList.add('rolling');
            
            let rollInterval = setInterval(() => {
                diceEl.innerText = diceFaces[Math.floor(Math.random() * 6)];
            }, 50);

            setTimeout(() => {
                clearInterval(rollInterval);
                diceEl.classList.remove('rolling');
                
                currentDiceNumber = Math.floor(Math.random() * 6) + 1;
                diceEl.innerText = diceFaces[currentDiceNumber - 1];
                
                setTimeout(() => {
                    showQuestion(currentDiceNumber);
                }, 600);

            }, 1000);
        }

        function showQuestion(diceNum) {
            document.getElementById('dice-section').style.display = 'none';
            const feedbackEl = document.getElementById('feedback-section');
            const nextBtn = document.getElementById('next-btn');
            
            let categoryQuestions = questionsBank[diceNum];
            
            if(categoryQuestions.length === 0) {
                feedbackEl.innerHTML = `خلصت أسئلة الرقم <b>${diceNum}</b>! 😲<br>تقدر ترمي النرد مرة ثانية مجاناً.`;
                feedbackEl.className = 'feedback info';
                feedbackEl.style.display = 'block';
                nextBtn.innerText = "ارمِ النرد مرة ثانية 🎲";
                nextBtn.onclick = resetTurn;
                nextBtn.style.display = 'block';
                return; 
            }

            const randomIdx = Math.floor(Math.random() * categoryQuestions.length);
            currentQuestionObj = categoryQuestions[randomIdx];

            categoryQuestions.splice(randomIdx, 1);

            let pointsWord = diceNum === 1 ? 'نقطة' : (diceNum === 2 ? 'نقطتين' : 'نقاط');
            document.getElementById('q-points').innerText = `سؤال بـ ${diceNum} ${pointsWord}`;
            
            let badgeColor = "var(--gold)";
            if (diceNum <= 2) badgeColor = "#10b981"; 
            else if (diceNum >= 5) badgeColor = "#ef4444"; 

            document.getElementById('q-points').style.borderColor = badgeColor;
            document.getElementById('q-points').style.color = badgeColor;
            document.getElementById('q-points').style.backgroundColor = `${badgeColor}33`; 
            
            document.getElementById('q-text').innerText = currentQuestionObj.q;

            let shuffledOptions = [...currentQuestionObj.options].sort(() => Math.random() - 0.5);
            
            const optionsArea = document.getElementById('options-area');
            optionsArea.innerHTML = '';
            
            shuffledOptions.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt);
                optionsArea.appendChild(btn);
            });

            document.getElementById('question-section').style.display = 'block';
        }

        function checkAnswer(btnClicked, selectedAnswer) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            const isCorrect = (selectedAnswer === currentQuestionObj.answer);
            const feedbackEl = document.getElementById('feedback-section');
            const nextBtn = document.getElementById('next-btn');

            if (isCorrect) {
                btnClicked.classList.add('correct');
                correctCount++;
                score += currentDiceNumber; 
                
                document.getElementById('score-display').innerHTML = `${score} <span class="target-score">/ 20</span>`;
                document.getElementById('correct-count').innerText = correctCount;

                let pointsWord = currentDiceNumber === 1 ? 'نقطة' : (currentDiceNumber === 2 ? 'نقطتين' : 'نقاط');
                
                if (score >= 20) {
                    feedbackEl.innerHTML = `كفوو! كسبت ${currentDiceNumber} ${pointsWord}<br><br><span style="font-size:3rem;">🏆</span><br>ألف مبروك!<br>وصلت لـ ${score} نقطة وختمت اللعبة! 🎉`;
                    feedbackEl.className = 'feedback champion';
                    nextBtn.innerText = "العب من جديد 🔄";
                    nextBtn.onclick = () => location.reload(); 
                } else {
                    feedbackEl.innerHTML = `كفوو! إجابة صحيحة ✅<br>كسبت ${currentDiceNumber} ${pointsWord}!`;
                    feedbackEl.className = 'feedback win';
                    nextBtn.innerText = "استمرار 🚀";
                    nextBtn.onclick = resetTurn;
                }

            } else {
                btnClicked.classList.add('wrong');
                
                feedbackEl.innerHTML = `إجابة خاطئة ❌<br>الجواب الصح هو: <span style="color:var(--gold);">${currentQuestionObj.answer}</span><br><small style="color:#aaa;">(ما نقصنا منك شيء، العوض في الجاية)</small>`;
                feedbackEl.className = 'feedback lose';

                allBtns.forEach(b => {
                    if (b.innerText === currentQuestionObj.answer) b.classList.add('correct');
                });

                nextBtn.innerText = "استمرار 🚀";
                nextBtn.onclick = resetTurn;
            }
            
            feedbackEl.style.display = 'block';
            nextBtn.style.display = 'block';
        }

        function resetTurn() {
            document.getElementById('question-section').style.display = 'none';
            document.getElementById('feedback-section').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            
            document.getElementById('dice-section').style.display = 'block';
            document.getElementById('roll-btn').style.display = 'block';
            document.getElementById('dice').innerText = '🎲';
        }
    </script>
</body>
</html>
